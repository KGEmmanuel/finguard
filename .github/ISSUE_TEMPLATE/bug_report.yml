name: Bug report
description: Something broke
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v2.1.0 or SHA
    validations: { required: true }
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations: { required: true }
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations: { required: true }
  - type: checkboxes
    id: security
    attributes:
      label: Security check
      options:
        - label: This is NOT a security vulnerability (those go to SECURITY.md private reporting)
          required: true
