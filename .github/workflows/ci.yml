# Hosted CI is DISABLED for now (GitHub Actions unavailable on this account).
# The same gate runs locally on every push via the pre-push hook: `pnpm verify`
# (typecheck + build + 18 tests + golden-pack determinism + CLI round-trip).
#
# To re-enable hosted CI later, replace the `on:` block with:
#   on:
#     push: { branches: [main] }
#     pull_request:
name: CI

on:
  workflow_dispatch: # manual only — never auto-runs, never bills

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

  determinism:
    name: Golden-pack determinism gate
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York # deliberately non-UTC — pack bytes must not depend on the builder's timezone
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm golden:check
      - name: CLI end-to-end on the golden pack
        run: node packages/verify/dist/cli.js fixtures/golden-pack/output/finguard-evidence-golden.zip --no-color
