name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

  determinism:
    name: Golden-pack determinism gate
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York # deliberately non-UTC — pack bytes must not depend on the builder's timezone
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Rebuild the evidence pack from fixture inputs; assert byte-identical to
      # the checked-in golden output; verify the golden zip with the verifier
      # built from this same commit.
      - run: pnpm golden:check
      - name: CLI end-to-end on the golden pack
        run: node packages/verify/dist/cli.js fixtures/golden-pack/output/finguard-evidence-golden.zip --no-color

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with: { languages: javascript-typescript }
      - uses: github/codeql-action/analyze@v3
